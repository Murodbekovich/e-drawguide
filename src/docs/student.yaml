paths:
  /mobile/library:
    get:
      tags: [MOBILE]
      summary: Kitoblar ro'yxati
      security:
        - bearerAuth: []
      parameters:
        - name: lang
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
      responses:
        200: { description: OK }
  /mobile/videos:
    get:
      tags: [MOBILE]
      summary: Videolar ro'yxati
      security:
        - bearerAuth: []
      responses:
        200: { description: OK }
  /mobile/quizzes:
    get:
      tags: [MOBILE]
      summary: Testlar ro'yxati
      security:
        - bearerAuth: []
      responses:
        200: { description: OK }
  /mobile/quizzes/{id}:
    get:
      tags: [MOBILE]
      summary: Testni boshlash
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        200: { description: OK }
  /mobile/quizzes/{id}/submit:
    post:
      tags: [MOBILE]
      summary: Test topshirish
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [answers]
              properties:
                answers: { type: array, items: { type: object } }
      responses:
        200: { description: OK }
  /mobile/config/check-version:
    get:
      tags: [MOBILE]
      summary: Versiyani tekshirish
      parameters:
        - name: platform
          in: query
          required: true
          schema: { type: string }
        - name: version
          in: query
          required: true
          schema: { type: string }
      responses:
        200: { description: OK }
  /mobile/health:
    get:
      tags: [MOBILE]
      summary: Health check
      responses:
        200: { description: OK }