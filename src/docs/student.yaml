paths:
  /mobile/auth/register:
    post:
      tags: [MOBILE]
      summary: Ro'yxatdan o'tish
      responses:
        201: { description: OK }
  /mobile/auth/login:
    post:
      tags: [MOBILE]
      summary: Login
      responses:
        200: { description: OK }
  /mobile/auth/logout:
    post:
      tags: [MOBILE]
      summary: Logout
      responses:
        200: { description: OK }
  /mobile/auth/profile:
    get:
      tags: [MOBILE]
      summary: Profil
      responses:
        200: { description: OK }
  /mobile/auth/my-results:
    get:
      tags: [MOBILE]
      summary: Natijalar tarixi
      responses:
        200: { description: OK }
  /mobile/auth/refresh:
    post:
      tags: [MOBILE]
      summary: Token yangilash
      responses:
        200: { description: OK }
  /mobile/library:
    get:
      tags: [MOBILE]
      summary: Kitoblar ro'yxati
      responses:
        200: { description: OK }
  /mobile/videos:
    get:
      tags: [MOBILE]
      summary: Videolar ro'yxati
      responses:
        200: { description: OK }
  /mobile/quizzes:
    get:
      tags: [MOBILE]
      summary: Testlar ro'yxati
      responses:
        200: { description: OK }
  /mobile/quizzes/{id}:
    get:
      tags: [MOBILE]
      summary: Testni boshlash
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200: { description: OK }
  /mobile/quizzes/{id}/submit:
    post:
      tags: [MOBILE]
      summary: Test topshirish
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200: { description: OK }
  /mobile/config/check-version:
    get:
      tags: [MOBILE]
      summary: Versiyani tekshirish
      responses:
        200: { description: OK }
  /mobile/health:
    get:
      tags: [MOBILE]
      summary: Health check
      responses:
        200: { description: OK }