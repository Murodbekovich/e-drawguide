paths:
  /mobile/library:
    get:
      tags: [MOBILE]
      summary: Kitoblar ro'yxati
      security:
        - bearerAuth: []
      parameters:
        - name: lang
          in: query
          schema: { type: string, enum: [uz, ru, en] }
      responses:
        200:
          description: OK
  /mobile/quizzes/{id}/submit:
    post:
      tags: [MOBILE]
      summary: Test topshirish
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [answers]
              properties:
                answers:
                  type: array
                  items:
                    type: object
                    properties:
                      question_id: { type: string, format: uuid }
                      selected_option: { type: string }
      responses:
        200:
          description: OK