paths:
  /mobile/auth/register:
    post:
      tags: [MOBILE]
      summary: Ro'yxatdan o'tish
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [fullName, phone, password]
              properties:
                fullName: { type: string }
                phone: { type: string }
                password: { type: string }
      responses:
        201: { description: Created }
  /mobile/auth/login:
    post:
      tags: [MOBILE]
      summary: Login
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [phone, password]
              properties:
                phone: { type: string }
                password: { type: string }
      responses:
        200: { description: OK }
  /mobile/auth/logout:
    post:
      tags: [MOBILE]
      summary: Logout
      security:
        - bearerAuth: []
      responses:
        200: { description: OK }
  /mobile/auth/profile:
    get:
      tags: [MOBILE]
      summary: Profil
      security:
        - bearerAuth: []
      responses:
        200: { description: OK }
  /mobile/auth/my-results:
    get:
      tags: [MOBILE]
      summary: Natijalar tarixi
      security:
        - bearerAuth: []
      responses:
        200: { description: OK }
  /mobile/auth/refresh:
    post:
      tags: [MOBILE]
      summary: Token yangilash
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        200: { description: OK }