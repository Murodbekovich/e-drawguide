paths:
  /mobile/auth/register:
    post:
      tags: [MOBILE]
      summary: Ro'yxatdan o'tish
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [fullName, phone, password]
              properties:
                fullName: { type: string }
                phone: { type: string }
                password: { type: string }
      responses:
        201: { description: OK }
  /mobile/auth/login:
    post:
      tags: [MOBILE]
      summary: Login
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [phone, password]
              properties:
                phone: { type: string }
                password: { type: string }
      responses:
        200: { description: OK }
  /admin/auth/login:
    post:
      tags: [ADMIN]
      summary: Admin login
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [login, password]
              properties:
                login: { type: string }
                password: { type: string }
      responses:
        200: { description: OK }