paths:
  /auth/register:
    post:
      tags: [MOBILE]
      summary: Ro'yxatdan o'tish
      responses:
        201: { description: OK }
  /auth/login:
    post:
      tags: [MOBILE]
      summary: Login
      responses:
        200: { description: OK }
  /admin/auth/login:
    post:
      tags: [ADMIN]
      summary: Admin panelga kirish
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [login, password]
              properties:
                login: { type: string }
                password: { type: string }
      responses:
        200: { description: OK }
  /mobile/auth/logout:
    post:
      tags: [MOBILE]
      summary: Logout
      security:
        - bearerAuth: []
      responses:
        200: { description: OK }
  /mobile/auth/profile:
    get:
      tags: [MOBILE]
      summary: Profil
      security:
        - bearerAuth: []
      responses:
        200: { description: OK }
  /mobile/auth/my-results:
    get:
      tags: [MOBILE]
      summary: Natijalar tarixi
      security:
        - bearerAuth: []
      responses:
        200: { description: OK }
  /mobile/auth/refresh:
    post:
      tags: [MOBILE]
      summary: Token yangilash
      responses:
        200: { description: OK }