components:
  schemas:
    VideoInput:
      type: object
      required: [title, video_url]
      properties:
        title: { type: string }
        description: { type: string }
        video_url: { type: string }
        thumbnail_file: { type: string, format: binary }
    LibraryInput:
      type: object
      required: [title, author, language, book_file]
      properties:
        title: { type: string }
        author: { type: string }
        language: { type: string }
        book_file: { type: string, format: binary }