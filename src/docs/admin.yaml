paths:
  /admin/library:
    post:
      tags: [ADMIN]
      summary: Kitob yuklash
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, author, language, book_file]
              properties:
                title: { type: string }
                author: { type: string }
                language: { type: string, enum: [uz, ru, en] }
                book_file: { type: string, format: binary }
                cover_file: { type: string, format: binary }
      responses:
        201:
          description: OK
        400:
          description: Bad Request
        401:
          description: Unauthorized
  /admin/videos:
    post:
      tags: [ADMIN]
      summary: Video yuklash
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, video_url]
              properties:
                title: { type: string }
                description: { type: string }
                video_url: { type: string }
                thumbnail_file: { type: string, format: binary }
      responses:
        201:
          description: OK
  /admin/quizzes:
    post:
      tags: [ADMIN]
      summary: Yangi test yaratish
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
      responses:
        201:
          description: OK
  /admin/users:
    get:
      tags: [ADMIN]
      summary: Talabalar ro'yxati
      security:
        - bearerAuth: []
      responses:
        200:
          description: OK