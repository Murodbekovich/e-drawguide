paths:
  /admin/auth/login:
    post:
      tags: [ADMIN]
      summary: Admin panelga kirish
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [login, password]
              properties:
                login: { type: string }
                password: { type: string }
      responses:
        200: { description: OK }
  /admin/library:
    post:
      tags: [ADMIN]
      summary: Kitob yuklash
      security:
        - bearerAuth: []
      responses:
        201: { description: OK }
  /admin/library/{id}:
    delete:
      tags: [ADMIN]
      summary: Kitobni o'chirish
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200: { description: OK }
  /admin/videos:
    post:
      tags: [ADMIN]
      summary: Video yuklash
      security:
        - bearerAuth: []
      responses:
        201: { description: OK }
  /admin/videos/{id}:
    delete:
      tags: [ADMIN]
      summary: Videoni o'chirish
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200: { description: OK }
  /admin/videos/{id}/restore:
    patch:
      tags: [ADMIN]
      summary: Videoni tiklash
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200: { description: OK }
  /admin/quizzes:
    get:
      tags: [ADMIN]
      summary: Testlar ro'yxati
      security:
        - bearerAuth: []
      responses:
        200: { description: OK }
    post:
      tags: [ADMIN]
      summary: Yangi test yaratish
      security:
        - bearerAuth: []
      responses:
        201: { description: OK }
  /admin/quizzes/{id}/questions:
    post:
      tags: [ADMIN]
      summary: Savol qo'shish
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        201: { description: OK }
  /admin/users:
    get:
      tags: [ADMIN]
      summary: Talabalar ro'yxati
      security:
        - bearerAuth: []
      responses:
        200: { description: OK }
  /admin/results:
    get:
      tags: [ADMIN]
      summary: Natijalar hisoboti
      security:
        - bearerAuth: []
      responses:
        200: { description: OK }